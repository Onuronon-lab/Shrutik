# Shrutik Voice Collection Platform - Development Deployment
# Optimized for EC2 development deployment with Docker Hub images
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: shrutik_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voice_collection}
      POSTGRES_USER: ${POSTGRES_USER:-production_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-production_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shrutik_network

  redis:
    image: redis:7-alpine
    container_name: shrutik_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shrutik_network

  backend:
    image: ${DOCKER_IMAGE:-yourusername/shrutik:latest}
    container_name: shrutik_backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - UPLOAD_DIR=/app/uploads
      - EXPORT_DIR=/app/exports
      - EXPORT_STORAGE_TYPE=${EXPORT_STORAGE_TYPE:-local}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - shrutik_network

  celery:
    image: ${DOCKER_IMAGE:-yourusername/shrutik:latest}
    container_name: shrutik_celery
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - UPLOAD_DIR=/app/uploads
      - EXPORT_DIR=/app/exports
      - EXPORT_STORAGE_TYPE=${EXPORT_STORAGE_TYPE:-local}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    command: celery -A app.core.celery_app worker --loglevel=info --queues=default,audio_processing,consensus,batch_processing,maintenance --concurrency=4
    restart: unless-stopped
    networks:
      - shrutik_network

  celery-beat:
    image: ${DOCKER_IMAGE:-yourusername/shrutik:latest}
    container_name: shrutik_celery_beat
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - UPLOAD_DIR=/app/uploads
      - EXPORT_DIR=/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    command: celery -A app.core.celery_app beat --loglevel=info
    restart: unless-stopped
    networks:
      - shrutik_network

  celery-flower:
    image: ${DOCKER_IMAGE:-yourusername/shrutik:latest}
    container_name: shrutik_flower
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEBUG=false
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:secure_password}
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH:-admin:secure_password}
    restart: unless-stopped
    networks:
      - shrutik_network

  nginx:
    image: nginx:alpine
    container_name: shrutik_nginx
    ports:
      - "3080:80"
      - "3443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/error-pages.conf:/etc/nginx/conf.d/error-pages.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - celery-flower
    restart: unless-stopped
    networks:
      - shrutik_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  exports_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  shrutik_network:
    driver: bridge